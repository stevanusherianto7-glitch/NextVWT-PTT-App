# LiveKit SFU dev stack untuk NextVWT PTT.
# Jalankan: docker compose -f docker-compose.livekit.yml up -d
# Hentikan: docker compose -f docker-compose.livekit.yml down
#
# URL ws yang dipakai app: ws://localhost:7880  (lihat .env VITE_LIVEKIT_URL)
# Key/secret dev (cocok dengan .env.example LIVEKIT_API_KEY/SECRET):
#   devkey / devsecret1234567890abcdefghijklmn
# JANGAN pakai key ini di production — ganti via secret Supabase / env VPS.

services:
  livekit:
    image: livekit/livekit-server:latest
    container_name: nextvwt-livekit
    restart: unless-stopped
    ports:
      - "7880:7880"        # WebSocket / signaling (VITE_LIVEKIT_URL)
      - "7881:7881"        # HTTP debug port
      - "50000-50020:50000-50020/udp"  # media (TURN/ICE range)
    environment:
      # LiveKit baca konfig dari env LIVEKIT_*
      LIVEKIT_API_KEY: devkey
      LIVEKIT_API_SECRET: devsecret1234567890abcdefghijklmn
      LIVEKIT_WS_PORT: "7880"
      # Dev mode: izinkan localhost tanpa TLS (ws:// bukan wss://)
      LIVEKIT_DEV: "true"
    command: >
      --dev
      --bind 0.0.0.0:7880
      --rtc-port 50000-50020
      --keys devkey:devsecret1234567890abcdefghijklmn

  # Redis opsional untuk webhook/presence — tidak wajib untuk dev mesh→SFU.
  # Dibiarkan comentar; uncomment bila perlu.
  # redis:
  #   image: redis:7-alpine
  #   container_name: nextvwt-redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
